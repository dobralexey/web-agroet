name: Keep Streamlit App Awake

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  keep-awake:
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install selenium webdriver-manager
          
      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser
          
      - name: Wake up or Clear Cache on Streamlit app
        run: |
          cat > interact_streamlit.py << 'EOF'
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          from selenium.webdriver.chrome.service import Service
          from selenium.webdriver.chrome.options import Options
          from webdriver_manager.chrome import ChromeDriverManager
          import time
          from datetime import datetime

          def interact_with_streamlit():
              url = "https://agroet.streamlit.app"
              
              # Chrome options for headless mode
              chrome_options = Options()
              chrome_options.add_argument("--headless=new")
              chrome_options.add_argument("--no-sandbox")
              chrome_options.add_argument("--disable-dev-shm-usage")
              chrome_options.add_argument("--disable-gpu")
              chrome_options.add_argument("--window-size=1920,1080")
              chrome_options.add_argument("--user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36")
              
              driver = None
              try:
                  print(f"[{datetime.now()}] Starting Chrome browser...")
                  service = Service(ChromeDriverManager().install())
                  driver = webdriver.Chrome(service=service, options=chrome_options)
                  
                  print(f"[{datetime.now()}] Navigating to {url}")
                  driver.get(url)
                  
                  # Wait for page to load
                  time.sleep(5)
                  
                  page_source = driver.page_source.lower()
                  
                  # Check if app is sleeping
                  if 'sleep' in page_source or 'wake' in page_source:
                      print(f"[{datetime.now()}] App is SLEEPING - Looking for wake button...")
                      
                      try:
                          # Look for the "Yes, get this app back up!" button
                          # Common patterns for the wake button
                          button_selectors = [
                              "//button[contains(text(), 'get this app back up')]",
                              "//button[contains(text(), 'wake')]",
                              "//button[contains(text(), 'Yes')]",
                              "//a[contains(text(), 'get this app back up')]",
                              "//a[contains(text(), 'wake')]",
                              "//button[contains(@class, 'wake')]",
                              "//*[contains(text(), 'get this app back up')]"
                          ]
                          
                          wake_button = None
                          for selector in button_selectors:
                              try:
                                  wake_button = WebDriverWait(driver, 5).until(
                                      EC.element_to_be_clickable((By.XPATH, selector))
                                  )
                                  print(f"[{datetime.now()}] Found wake button: {wake_button.text}")
                                  break
                              except:
                                  continue
                          
                          if wake_button:
                              print(f"[{datetime.now()}] Clicking wake button...")
                              wake_button.click()
                              print(f"[{datetime.now()}] ✅ Wake button clicked!")
                              
                              # Wait for app to wake up
                              time.sleep(15)
                              
                              # Verify app is awake
                              new_page_source = driver.page_source.lower()
                              if 'sleep' not in new_page_source:
                                  print(f"[{datetime.now()}] ✅ App successfully woken up!")
                              else:
                                  print(f"[{datetime.now()}] ⚠️ App may still be sleeping")
                          else:
                              print(f"[{datetime.now()}] Could not find wake button")
                              # Take screenshot for debugging
                              driver.save_screenshot("sleeping_page.png")
                              
                      except Exception as e:
                          print(f"[{datetime.now()}] Error finding/clicking wake button: {e}")
                          driver.save_screenshot("error_sleeping.png")
                  
                  else:
                      # App is awake - look for Clear Cache button
                      print(f"[{datetime.now()}] App is AWAKE - Looking for Clear Cache button...")
                      
                      try:
                          # First, try to find and click the hamburger menu (☰) if needed
                          menu_selectors = [
                              "//button[contains(@aria-label, 'menu')]",
                              "//button[contains(@data-testid, 'stMainMenu')]",
                              "//*[contains(@class, 'stMainMenu')]",
                              "//button[contains(text(), '☰')]",
                              "//*[@data-testid='stMainMenu']"
                          ]
                          
                          menu_button = None
                          for selector in menu_selectors:
                              try:
                                  menu_button = WebDriverWait(driver, 5).until(
                                      EC.element_to_be_clickable((By.XPATH, selector))
                                  )
                                  print(f"[{datetime.now()}] Opening menu...")
                                  menu_button.click()
                                  time.sleep(2)
                                  break
                              except:
                                  continue
                          
                          # Now look for Clear Cache button
                          cache_selectors = [
                              "//*[contains(text(), 'Clear cache')]",
                              "//button[contains(text(), 'Clear cache')]",
                              "//*[contains(text(), 'clear cache')]",
                              "//*[contains(text(), 'Rerun')]",
                              "//button[contains(text(), 'Rerun')]"
                          ]
                          
                          cache_button = None
                          for selector in cache_selectors:
                              try:
                                  cache_button = WebDriverWait(driver, 5).until(
                                      EC.element_to_be_clickable((By.XPATH, selector))
                                  )
                                  print(f"[{datetime.now()}] Found button: {cache_button.text}")
                                  break
                              except:
                                  continue
                          
                          if cache_button:
                              print(f"[{datetime.now()}] Clicking '{cache_button.text}' button...")
                              cache_button.click()
                              print(f"[{datetime.now()}] ✅ Button clicked successfully!")
                              time.sleep(3)
                          else:
                              print(f"[{datetime.now()}] Clear Cache button not found")
                              # Try alternative: just reload the page to keep it active
                              driver.refresh()
                              time.sleep(5)
                              print(f"[{datetime.now()}] Refreshed page as alternative")
                      
                      except Exception as e:
                          print(f"[{datetime.now()}] Error interacting with active app: {e}")
                          # At minimum, refresh the page
                          driver.refresh()
                          time.sleep(5)
                  
                  return True
                  
              except Exception as e:
                  print(f"[{datetime.now()}] Critical error: {str(e)}")
                  if driver:
                      driver.save_screenshot("error_page.png")
                  return False
                  
              finally:
                  if driver:
                      driver.quit()
                      print(f"[{datetime.now()}] Browser closed")

          if __name__ == "__main__":
              success = interact_with_streamlit()
              if success:
                  print(f"[{datetime.now()}] ✅ Script completed successfully")
              else:
                  print(f"[{datetime.now()}] ❌ Script failed")
                  exit(1)
          EOF
          
      - name: Run interaction script
        run: python interact_streamlit.py
        
      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshots
          path: "*.png"
