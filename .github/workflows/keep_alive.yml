name: Keep Streamlit App Awake (Advanced)

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  keep-awake:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run keep-awake script
        run: python scripts/keep_awake.py "${{ secrets.STREAMLIT_APP_URL }}"
        env:
          STREAMLIT_APP_URL: ${{ secrets.STREAMLIT_APP_URL }}